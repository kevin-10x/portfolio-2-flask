<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">Kevin.dev</div>

        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>
</header>
<script>
const words = [
    "Python Developer",
    "Flask Developer",
    "React Developer",
    "AI Enthusiast"
];

let wordIndex = 0;
let charIndex = 0;
let currentWord = "";
let currentChar = "";

const typingElement =
document.querySelector(".typing");

function type() {

    if(wordIndex < words.length){

        currentWord = words[wordIndex];

        currentChar =
        currentWord.slice(0, ++charIndex);

        typingElement.textContent =
        currentChar;

        if(currentChar.length ==
           currentWord.length){

            setTimeout(() => {

                charIndex = 0;

                wordIndex++;

                if(wordIndex ==
                   words.length){
                    wordIndex = 0;
                }

            }, 1500);

        }

    }

    setTimeout(type, 150);

}

type();
</script>

{% block content %}
{% endblock %}

<footer>
    <p>© 2026 Kevin Kipkoech | Flask Developer</p>
</footer>

</body>
</html>
